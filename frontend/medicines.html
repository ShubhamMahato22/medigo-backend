<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medicines | MediGo</title>
    <meta
      name="description"
      content="Browse all available medicines on MediStore."
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- ===================== NAVBAR ===================== -->
    <nav class="navbar">
      <div class="logo">Medi<span>Go</span></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="medicines.html" class="active">Medicines</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li id="auth-section"></li>
      </ul>
    </nav>

    <!-- ===================== PAGE HEADER ===================== -->
    <section class="section" style="padding-bottom: 0">
      <h1 class="section-title">All Medicines</h1>
      <p style="text-align: center; color: #64748b; margin-bottom: 24px">
        Browse our wide range of medicines. Click "Add to Cart" to start
        shopping.
      </p>
    </section>

    <!-- ===================== SEARCH BAR ===================== -->
    <section class="section" style="padding-top:0; padding-bottom:0;">
      <div style="
        max-width: 520px;
        margin: 0 auto 8px;
        position: relative;
      ">
        <span style="
          position: absolute;
          left: 16px;
          top: 50%;
          transform: translateY(-50%);
          font-size: 1rem;
          color: #94a3b8;
          pointer-events: none;
        ">🔍</span>
        <input
          id="search-input"
          type="text"
          placeholder="Search medicines..."
          autocomplete="off"
          aria-label="Search medicines"
          style="
            width: 100%;
            padding: 12px 18px 12px 44px;
            border: 1.5px solid #d1fae5;
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            color: #1e293b;
            background: #ffffff;
            outline: none;
            box-shadow: 0 2px 10px rgba(22,163,74,0.08);
            transition: border-color 0.2s, box-shadow 0.2s;
          "
          onfocus="this.style.borderColor='#16a34a'; this.style.boxShadow='0 0 0 3px rgba(22,163,74,0.15)';"
          onblur="this.style.borderColor='#d1fae5'; this.style.boxShadow='0 2px 10px rgba(22,163,74,0.08)';"
        />
      </div>
      
      <!-- Category Filters -->
      <div id="category-filters" style="max-width: 800px; margin: 16px auto 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
      </div>
    </section>

    <!-- ===================== MEDICINES GRID ===================== -->
    <section class="section">
      <!-- Loading state shown while fetching data -->
      <p id="loading-msg" style="text-align: center; color: #64748b">
         Loading medicines...
      </p>

      <!-- Error message (shown if API fails) -->
      <p
        id="error-msg"
        style="text-align: center; color: red; display: none"
      ></p>

      <!-- Cards will be injected here by JavaScript -->
      <div class="cards-grid" id="medicines-grid"></div>
    </section>

    <!-- ===================== FOOTER ===================== -->
    <footer class="footer">
      <p>&copy; 2024 <span>MediGo</span>. All rights reserved.</p>
    </footer>

    <script src="../js/medicines.js"></script>
  </body>
</html>
