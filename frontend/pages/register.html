<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | MediGo</title>
  <meta name="description" content="Create your MediStore account." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar">
    <div class="logo">Medi<span>Go</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="medicines.html">Medicines</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li id="auth-section"></li>
    </ul>
  </nav>

  <!-- ===================== REGISTER FORM ===================== -->
  <div class="form-container">
    <h2>Create Account</h2>

    <!-- Success/Error Message Box -->
    <div class="message" id="register-message"></div>

    <!-- Registration Form -->
    <form id="register-form">

      <!-- Full Name -->
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input
          type="text"
          id="reg-name"
          name="name"
          placeholder="John Doe"
          required
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input
          type="email"
          id="reg-email"
          name="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="reg-phone">Phone Number</label>
        <input
          type="tel"
          id="reg-phone"
          name="phone"
          placeholder="9876543210"
        />
      </div>

      <!-- Address -->
      <div class="form-group">
        <label for="reg-address">Delivery Address</label>
        <input
          type="text"
          id="reg-address"
          name="address"
          placeholder="123 Main St, City"
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input
          type="password"
          id="reg-password"
          name="password"
          placeholder="Create a strong password"
          required
        />
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary" style="width: 100%;">
        Create Account
      </button>
    </form>

    <!-- Link to Login Page -->
    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <p>&copy; 2024 <span>MediGo</span>. All rights reserved.</p>
  </footer>

  <!-- ===================== JAVASCRIPT ===================== -->
  <script src="../js/register.js"></script>

</body>
</html>
